<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index,follow" />
    <meta name="color-scheme" content="light dark" />
    <meta name="author" content="adelefaell" />
    <meta name="application-name" content="Minty Flow" />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#007B17"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#C0FFCA"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Google Search Console -->
    <meta
      name="google-site-verification"
      content="4N_oRXOeUxvbqB1jzy40SBBk8C8LAg5ni046iLXvN2o"
    />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://minty-flow-web.adelefaell.workers.dev/" />

    <!-- SEO -->
    <title>Minty Flow — Free Expense Tracker, No Account Required</title>

    <meta name="description" content="Minty Flow is a free, open-source expense tracker that works 100% offline. No account, no ads, no subscriptions. Track income, expenses, budgets, and recurring transactions while keeping all your data stored locally on your Android device." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Minty Flow" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://minty-flow-web.adelefaell.workers.dev/" />

    <meta property="og:title" content="Minty Flow — Free Expense Tracker, No Account Required" />

    <meta property="og:description" content="Minty Flow is a free, open-source expense tracker that works 100% offline. No account, no ads, no subscriptions." />

    <meta property="og:image" content="https://minty-flow-web.adelefaell.workers.dev/icon.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://minty-flow-web.adelefaell.workers.dev/" />
    <meta name="twitter:title" content="Minty Flow — Free Expense Tracker, No Account Required" />
    <meta name="twitter:description" content="Minty Flow is a free, open-source expense tracker that works 100% offline. No account, no ads, no subscriptions." />
    <meta name="twitter:image" content="https://minty-flow-web.adelefaell.workers.dev/icon.png" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Minty Flow",
        "description": "Minty Flow is a free, open-source, privacy-first expense tracker. Track income and expenses, manage budgets, and visualize your spending with all data stored locally on your device.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Android",
        "url": "https://minty-flow-web.adelefaell.workers.dev/",
        "downloadUrl": "https://play.google.com/store/apps/details?id=com.mintyflow.tracker",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "100% free with no premium tier",
          "No account required",
          "Works completely offline",
          "All data stored locally",
          "60+ built-in themes",
          "Multiple currency support",
          "Recurring transactions",
          "CSV import and export",
          "Open source"
        ],
        "author": {
          "@type": "Organization",
          "name": "Minty Flow",
          "url": "https://github.com/Minty-Flow"
        }
      }
    </script>

    <!-- Structured Data: Website -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Minty Flow",
        "url": "https://minty-flow-web.adelefaell.workers.dev/"
      }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Minty Flow",
        "url": "https://minty-flow-web.adelefaell.workers.dev/",
        "sameAs": [
          "https://github.com/Minty-Flow",
          "https://play.google.com/store/apps/details?id=com.mintyflow.tracker"
        ]
      }
    </script>

    <!-- Fonts -->
    <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/plus-jakarta-sans.woff2" as="font" type="font/woff2" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
